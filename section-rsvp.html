<section class="glass-card p-8 reveal-cascade" id="section-rsvp">
            <div class="text-center mb-10">
                <i class="fa-regular fa-paper-plane text-amber-200/50 text-2xl mb-3"></i>
                <h2 class="font-serif text-3xl text-amber-100 text-shadow-sm">Konfirmasi Kehadiran</h2>
                <p class="text-xs text-gray-200 mt-2 text-shadow-sm">Bantu kami mempersiapkan jamuan terbaik dengan mengisi form berikut</p>
            </div>
            
            <!-- RSVP Form Container -->
            <div class="glass-card p-6 mb-10 !rounded-2xl">
                <form class="space-y-4" id="rsvpForm" onsubmit="handleFormSubmit(event)">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-200 mb-1.5 text-shadow-sm" for="form-name">Nama Anda</label>
                        <input class="w-full px-4 py-2.5 bg-white/20 border border-white/30 rounded-xl text-sm text-white placeholder-gray-300 focus:outline-none focus:border-amber-300 focus:ring-1 focus:ring-amber-300 transition" id="form-name" placeholder="Masukkan nama lengkap" required="" type="text"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-200 mb-1.5 text-shadow-sm" for="form-status">Konfirmasi Kehadiran</label>
                        <select class="w-full px-4 py-2.5 bg-white/20 border border-white/30 rounded-xl text-sm text-white focus:outline-none focus:border-amber-300 focus:ring-1 focus:ring-amber-300 transition" id="form-status" required="">
                            <option class="text-gray-900" disabled="" selected="" value="">— Pilih Status —</option>
                            <option class="text-gray-900" value="Hadir">Saya Akan Hadir</option>
                            <option class="text-gray-900" value="Tidak Hadir">Maaf, Tidak Bisa Hadir</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-200 mb-1.5 text-shadow-sm" for="form-wish">Ucapan &amp; Doa Restu (Wedding Wish)</label>
                        <textarea class="w-full px-4 py-2.5 bg-white/20 border border-white/30 rounded-xl text-sm text-white placeholder-gray-300 focus:outline-none focus:border-amber-300 focus:ring-1 focus:ring-amber-300 transition" id="form-wish" placeholder="Tuliskan doa indah Anda untuk kedua mempelai..." required="" rows="4"></textarea>
                    </div>
                    <button class="w-full cursor-pointer bg-white/20 hover:bg-white/30 border border-white/30 text-white font-medium text-sm py-3 rounded-xl shadow-md transition transform active:scale-95 flex items-center justify-center gap-2" type="submit">
                        <i class="fa-regular fa-paper-plane"></i> Kirim Ucapan
                    </button>
                </form>
            </div>
            
            <!-- PUBLIC WISHES SHOWCASE FEED -->
            <div>
                <h3 class="font-serif text-xl text-amber-100 mb-4 flex items-center gap-2 text-shadow-sm">
                    <i class="fa-regular fa-comments text-base text-amber-200/80"></i> Doa Restu Para Tamu
                </h3>
                <!-- Infinite/Scrolling Container Box -->
                <div class="custom-scrollbar max-h-80 overflow-y-auto space-y-3 pr-2 border-t border-white/20 pt-4" id="wishes-box">
                    <!-- Loaded dynamically via JavaScript -->
                    <div class="text-center py-8">
                        <i class="fa-solid fa-spinner animate-spin text-amber-200 text-2xl"></i>
                        <p class="text-xs text-gray-300 mt-2">Memuat ucapan...</p>
                    </div>
                </div>
            </div>
        </section>
